[PHP]
; Enable required extensions
extension=curl
extension=openssl
extension=gd
extension=mbstring
extension=fileinfo

; Allow HTTP file uploads
file_uploads=On
upload_max_filesize=10M
post_max_size=10M

; Memory limit
memory_limit=256M

; Error reporting
display_errors=On
error_reporting=E_ALL

; Timezone
date.timezone=Asia/Manila
